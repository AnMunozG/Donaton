services:

  mysql-usuarios:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-admin}
      MYSQL_DATABASE: usuarios_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_usuarios_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  mysql-logistica:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-admin}
      MYSQL_DATABASE: backend_logistica
    ports:
      - "3308:3306"
    volumes:
      - mysql_logistica_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  usuarios:
    build: ./usuarios
    ports:
      - "8000:8000"
    environment:
      DB_HOST: mysql-usuarios
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-admin}
      DEBUG: ${DJANGO_DEBUG:-True}
    depends_on:
      mysql-usuarios:
        condition: service_healthy

  logistica:
    build: ./logistica
    ports:
      - "8001:8001"
    environment:
      DB_HOST: mysql-logistica
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-admin}
      DEBUG: ${DJANGO_DEBUG:-True}
    depends_on:
      mysql-logistica:
        condition: service_healthy

  bff:
    build: ./bff
    ports:
      - "8080:8080"
    environment:
      USUARIOS_URL: http://usuarios:8000
      LOGISTICA_URL: http://logistica:8001
      LOGISTICA_JWT_SECRET: ${LOGISTICA_JWT_SECRET}
      BFF_JWT_SECRET: ${BFF_JWT_SECRET:-bff-jwt-secret-change-in-production}
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000,http://localhost:8000,http://localhost,http://localhost:80,http://localhost:8080
      DEBUG: ${DJANGO_DEBUG:-True}
      DB_NAME: /data/db.sqlite3
    volumes:
      - bff_data:/data
    depends_on:
      usuarios:
        condition: service_started
      logistica:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8080/api
    ports:
      - "80:80"
    depends_on:
      - bff

volumes:
  mysql_usuarios_data:
  mysql_logistica_data:
  bff_data:
